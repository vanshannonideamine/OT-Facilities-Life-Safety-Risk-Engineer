<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Van Blake Shannon — Field Brief</title>
<meta name="description" content="30 years. Zero fatalities. Zero unplanned shutdowns. The engineer AI infrastructure doesn't know it needs.">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--black:#080808;--white:#f2ede4;--accent:#c8f135;--red:#d42b20;--gray:#1c1c1c;--border:#2a2a2a;--mid:#555}
body{background:var(--black);color:var(--white);font-family:"IBM Plex Sans",sans-serif;font-weight:300;line-height:1.6;overflow-x:hidden}
a{text-decoration:none;color:inherit}

/* HERO */
.hero{position:relative;min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden}
.hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 15%;filter:grayscale(20%) contrast(1.05)}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(8,8,8,0.1) 0%,rgba(8,8,8,0.5) 45%,rgba(8,8,8,0.95) 80%,#080808 100%);z-index:1}
.hero-content{position:relative;z-index:2;padding:40px 28px 52px;max-width:720px}
.eyebrow{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.2em;color:var(--accent);text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.eyebrow::before{content:"";display:block;width:28px;height:1px;background:var(--accent)}
.hero h1{font-family:"Bebas Neue",sans-serif;font-size:clamp(60px,15vw,108px);line-height:.9;margin-bottom:24px}
.hero h1 span{color:var(--accent)}
.stats{display:flex;gap:32px;flex-wrap:wrap}
.stat-n{font-family:"Bebas Neue",sans-serif;font-size:36px;color:var(--accent);line-height:1}
.stat-l{font-family:"IBM Plex Mono",monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;opacity:.5;margin-top:2px}
.hero-cap{font-family:"IBM Plex Mono",monospace;font-size:10px;opacity:.3;margin-top:16px;letter-spacing:.05em}

/* WRAP */
.wrap{max-width:720px;margin:0 auto;padding:0 28px}

/* LABEL */
.slabel{font-family:"IBM Plex Mono",monospace;font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:12px;margin-bottom:28px}
.slabel::after{content:"";flex:1;height:1px;background:var(--border)}

/* DOCTRINE */
.doctrine{padding:72px 0 0}
.doc-block{border-left:2px solid var(--accent);padding:22px 26px;background:var(--gray);margin-bottom:20px}
.doc-block p{font-size:16px;line-height:1.8;opacity:.88}
.doc-block p+p{margin-top:12px}
.pull{font-family:"Bebas Neue",sans-serif;font-size:clamp(24px,5vw,36px);line-height:1.1;margin:28px 0 6px}
.pull span{color:var(--accent)}
.attr{font-family:"IBM Plex Mono",monospace;font-size:10px;color:var(--mid);letter-spacing:.08em}

/* BULLETS */
.bullets{padding:72px 0 0}
.bullet{display:grid;grid-template-columns:52px 1fr;gap:0 18px;padding:32px 0;border-bottom:1px solid var(--border)}
.bullet:first-of-type{border-top:1px solid var(--border)}
.bnum{font-family:"Bebas Neue",sans-serif;font-size:48px;color:var(--red);line-height:1;padding-top:4px}
.btitle{font-weight:500;font-size:17px;margin-bottom:10px;line-height:1.3}
.bbody{font-size:14px;opacity:.7;line-height:1.8}
.btag{display:inline-block;margin-top:12px;font-family:"IBM Plex Mono",monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);border:1px solid var(--accent);padding:3px 8px;opacity:.7}

/* ARTICLE */
.article{padding:72px 0 0}
.art-card{display:block;background:var(--gray);border:1px solid var(--border);padding:28px;transition:border-color .2s}
.art-card:hover{border-color:var(--accent)}
.art-label{font-family:"IBM Plex Mono",monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);margin-bottom:12px}
.art-title{font-family:"Bebas Neue",sans-serif;font-size:28px;line-height:1.1;margin-bottom:14px}
.art-pull{font-size:14px;opacity:.7;line-height:1.75;font-style:italic;border-left:2px solid var(--accent);padding-left:16px;margin-bottom:10px}
.art-cta{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--accent);letter-spacing:.1em}

/* GPTS */
.gpts{padding:72px 0 0}
.gpt-intro{font-size:14px;opacity:.65;line-height:1.8;margin-bottom:24px}
.gpt-grid{display:flex;flex-direction:column;gap:8px}
.gpt-card{display:grid;grid-template-columns:1fr auto;align-items:center;gap:12px;background:var(--gray);border:1px solid var(--border);padding:16px 20px;transition:border-color .2s,background .2s}
.gpt-card:hover{border-color:var(--accent);background:#222}
.gpt-n{font-family:"IBM Plex Mono",monospace;font-size:12px;font-weight:500;color:var(--accent);margin-bottom:3px}
.gpt-d{font-size:12px;opacity:.55;line-height:1.5}
.gpt-m{font-family:"IBM Plex Mono",monospace;font-size:10px;opacity:.4;text-align:right;white-space:nowrap}
.gpt-all{margin-top:10px;display:block;text-align:center;font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.1em;color:var(--accent);border:1px solid var(--border);padding:14px;transition:border-color .2s}
.gpt-all:hover{border-color:var(--accent)}

/* TOOLS */
.tools{padding:72px 0 0}
.tool-card{display:block;background:var(--gray);border:1px solid var(--border);padding:22px 24px;margin-bottom:8px;transition:border-color .2s}
.tool-card:hover{border-color:var(--accent)}
.tool-n{font-family:"IBM Plex Mono",monospace;font-size:12px;font-weight:500;color:var(--accent);margin-bottom:4px}
.tool-d{font-size:13px;opacity:.65;line-height:1.6}

/* SURFACES */
.surfaces{padding:72px 0 0}
.surf{display:flex;align-items:flex-start;gap:16px;padding:16px 0;border-bottom:1px solid var(--border)}
.surf:first-of-type{border-top:1px solid var(--border)}
.surf:hover .surf-url{color:var(--accent);opacity:1}
.surf-type{font-family:"IBM Plex Mono",monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);min-width:80px;padding-top:2px}
.surf-title{font-size:13px;font-weight:500;margin-bottom:2px}
.surf-url{font-family:"IBM Plex Mono",monospace;font-size:11px;opacity:.35;word-break:break-all;transition:color .15s,opacity .15s}

/* CONTACT */
.contact{margin-top:72px;background:var(--accent);padding:52px 28px}
.contact h2{font-family:"Bebas Neue",sans-serif;font-size:clamp(36px,8vw,56px);color:var(--black);line-height:1;margin-bottom:6px}
.contact p{font-size:12px;color:var(--black);opacity:.6;margin-bottom:24px;font-family:"IBM Plex Mono",monospace;letter-spacing:.05em}
.clinks{display:flex;flex-direction:column;gap:10px}
.clink{font-family:"IBM Plex Mono",monospace;font-size:15px;font-weight:500;color:var(--black);display:flex;align-items:center;gap:10px}
.clink span{font-size:9px;opacity:.5;letter-spacing:.1em;text-transform:uppercase;min-width:48px}
.clink:hover{opacity:.7}

footer{padding:28px;text-align:center;font-family:"IBM Plex Mono",monospace;font-size:9px;letter-spacing:.12em;color:var(--mid);text-transform:uppercase}

@media(min-width:600px){.hero-content,.wrap,.contact{padding-left:48px;padding-right:48px}}
</style>
</head>
